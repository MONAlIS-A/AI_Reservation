<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Discovery | Multi-Business Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --accent: #10B981;
            --bg-dark: #0F172A;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: #F8FAFC;
        }

        .discovery-panel {
            width: 40%;
            background: linear-gradient(145deg, #1E293B, #0F172A);
            padding: 80px 50px;
            display: flex; flex-direction: column; justify-content: center;
            border-right: 1px solid var(--border-glass);
            z-index: 2;
        }

        .icon-discovery {
            width: 80px; height: 80px;
            background: rgba(79, 70, 229, 0.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        h1 { font-size: 3.5rem; margin: 0; font-weight: 600; letter-spacing: -2px; line-height: 1; }
        .biz-accent { color: var(--primary); display: block; }
        p.tagline { color: #94A3B8; font-size: 1.3rem; margin: 25px 0 45px; max-width: 400px; line-height: 1.4; }

        .chat-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 40px; background: #0F172A; position: relative;
        }

        #messages {
            flex: 1; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg {
            max-width: 80%; padding: 20px 25px; border-radius: 28px;
            font-size: 1.1rem; line-height: 1.6;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: var(--card-glass); border: 1px solid var(--border-glass); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 10px 30px rgba(79, 70, 229, 0.25); }

        .input-bar-container {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 35px; padding: 12px 12px 12px 35px;
            display: flex; align-items: center; backdrop-filter: blur(20px);
        }

        input { background: transparent; border: none; color: white; flex: 1; font-size: 1.2rem; outline: none; }
        .btn-action { background: var(--primary); color: white; border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-action:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); }

        .typing-indicator { color: var(--primary); font-size: 0.95rem; margin-bottom: 15px; display: none; font-weight: 500; }

        /* Suggestions Styling */
        .suggestions-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            animation: fadeIn 0.5s ease;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #E2E8F0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestion-chip:hover {
            background: rgba(79, 70, 229, 0.15);
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .suggestion-chip svg {
            width: 16px;
            height: 16px;
            color: var(--primary);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="discovery-panel">
    <div class="icon-discovery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="40" height="40"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </div>
    <h1>Global AI <span class="biz-accent">Discovery</span></h1>
    <p class="tagline">Search for services across all our partner businesses and track your bookings in one place.</p>
    
    <a href="/booking-status/" style="display: inline-flex; align-items: center; gap: 10px; color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; font-weight: 500; transition: 0.3s; border: 1px solid var(--border-glass);" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Check Booking Status
    </a>
</div>

<div class="chat-area">
    <div id="messages">
        <div class="msg bot">Multi-Business Discovery Assistant. Connecting to partner network...</div>
    </div>
    
    <div class="typing-indicator" id="typing">Voyager is retrieving partner network...</div>

    <div id="suggestions-area" class="suggestions-container"></div>
    
    <div class="input-container">
        {% csrf_token %}
        <div class="input-bar-container">
            <input type="text" id="user-input" placeholder="Ask about any service..." autocomplete="off">
            <button class="btn-action" id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const msgs = document.getElementById('messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typing = document.getElementById('typing');

    // ✅ Global Client-Side History Buffer
    const getGlobalBuffer = () => {
        const lastInteraction = localStorage.getItem('global_chat_last_interaction');
        if (lastInteraction) {
            const timePassed = Date.now() - parseInt(lastInteraction);
            if (timePassed > 3600000) { // 1 hour in ms
                localStorage.removeItem('global_chat_history');
                localStorage.removeItem('global_chat_last_interaction');
                console.log("Global chat history expired.");
                return [];
            }
        }
        const buf = localStorage.getItem('global_chat_history');
        return buf ? JSON.parse(buf) : [];
    }
    const updateGlobalBuffer = (role, content) => {
        const buf = getGlobalBuffer();
        buf.push({ role, content });
        if (buf.length > 20) buf.shift();
        localStorage.setItem('global_chat_history', JSON.stringify(buf));
        localStorage.setItem('global_chat_last_interaction', Date.now().toString());
    }

    function append(text, isUser) {
        const div = document.createElement('div');
        div.className = `msg ${isUser ? 'user' : 'bot'}`;
        
        if (!isUser) {
            // ১. ইমেজ পার্স করা (New support added)
            text = text.replace(/!\[(.*?)\]\s?\((.*?)\)/g, '<div style="margin:10px 0;"><a href="$2" target="_blank"><img src="$2" style="max-width:100%; border-radius:12px; border: 1px solid var(--border-glass);" alt="$1"></a></div>');
            // ২. লিংক পার্স করা (Improved)
            text = text.replace(/\[(.*?)\]\s?\((.*?)\)/g, '<a href="$2" target="_blank" style="color:#60A5FA; font-weight:600; text-decoration: underline;">$1</a>');
            
            div.innerHTML = text.replace(/\n/g, '<br>');
        } else {
            div.textContent = text;
        }

        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function renderSuggestions(suggestions) {
        const area = document.getElementById('suggestions-area');
        area.innerHTML = '';
        if (!suggestions || suggestions.length === 0) return;

        suggestions.forEach(text => {
            const chip = document.createElement('div');
            chip.className = 'suggestion-chip';
            chip.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                ${text}
            `;
            chip.onclick = () => {
                input.value = text;
                input.focus();
            };
            area.appendChild(chip);
        });
    }

    async function submit(customMsg = null) {
        const text = customMsg || input.value.trim();
        if(!text) return;

        if(!customMsg) append(text, true);
        
        // Clear old suggestions
        document.getElementById('suggestions-area').innerHTML = '';

        input.value = ''; input.disabled = true; typing.style.display = 'block';

        const globalBuffer = getGlobalBuffer();

        try {
            const resp = await fetch('/api/global-chat/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value 
                },
                body: JSON.stringify({ 
                    message: text,
                    chat_history: globalBuffer
                })
            });
            const data = await resp.json();
            console.log("AI Response Data:", data);
            typing.style.display = 'none';
            if(data.answer) {
                append(data.answer, false);
                // Update Local Buffer
                updateGlobalBuffer('user', text);
                updateGlobalBuffer('assistant', data.answer);
                
                // ✅ Render suggestions if available
                if (data.suggestions) {
                    renderSuggestions(data.suggestions);
                }
            }
        } catch (e) {
            typing.style.display = 'none';
            append("An error occurred connecting to the global agent.", false);
        } finally {
            input.disabled = false; input.focus();
        }
    }

    window.onload = () => {
        // Force the use of search_across_businesses tool for real data
        submit("Use the 'search_across_businesses' tool with query='list all' to get the real directory. List the services first, then the business name, using this format: '- **[Service]** — [Business Name]'. Do not use numbers.");
    };

    sendBtn.onclick = () => submit();
    input.onkeypress = (e) => { if(e.key === 'Enter') submit(); }
</script>

</body>
</html>
