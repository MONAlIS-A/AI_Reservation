<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receptionist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .robot { font-size: 60px; margin-bottom: 16px; display: block; }
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub { color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 36px; }
        /* wave bars */
        .bars { display: flex; justify-content: center; align-items: center; gap: 5px; height: 50px; margin-bottom: 32px; }
        .bar { width: 5px; background: rgba(167,139,250,0.3); border-radius: 4px; height: 8px; transition: height 0.1s; }
        .bars.live .bar { background: linear-gradient(to top,#a78bfa,#60a5fa); animation: bwave 1s ease-in-out infinite; }
        .bar:nth-child(1){animation-delay:.0s} .bar:nth-child(2){animation-delay:.1s}
        .bar:nth-child(3){animation-delay:.2s} .bar:nth-child(4){animation-delay:.3s}
        .bar:nth-child(5){animation-delay:.4s} .bar:nth-child(6){animation-delay:.3s}
        .bar:nth-child(7){animation-delay:.2s} .bar:nth-child(8){animation-delay:.1s}
        .bar:nth-child(9){animation-delay:.0s}
        @keyframes bwave { 0%,100%{height:8px} 50%{height:36px} }
        /* big call button */
        #callBtn {
            width: 90px; height: 90px; border-radius: 50%; border: none;
            font-size: 36px; cursor: pointer;
            background: linear-gradient(135deg,#7c3aed,#3b82f6);
            box-shadow: 0 0 30px rgba(124,58,237,.5);
            margin: 0 auto 28px; display: flex; align-items: center; justify-content: center;
            transition: transform .2s, box-shadow .2s;
        }
        #callBtn:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(124,58,237,.7); }
        #callBtn.on {
            background: linear-gradient(135deg,#dc2626,#f97316);
            box-shadow: 0 0 30px rgba(220,38,38,.5);
            animation: pring 1.4s ease-in-out infinite;
        }
        @keyframes pring { 0%,100%{box-shadow:0 0 30px rgba(220,38,38,.5)} 50%{box-shadow:0 0 60px rgba(220,38,38,.8),0 0 0 18px rgba(220,38,38,.1)} }
        /* status pill */
        #statusPill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 7px 18px; border-radius: 30px; font-size: 13px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.07); color: rgba(255,255,255,.6);
            transition: all .3s;
        }
        #statusPill.ok { background: rgba(52,211,153,.15); border-color: rgba(52,211,153,.3); color: #34d399; }
        #statusPill.err { background: rgba(220,38,38,.15); border-color: rgba(220,38,38,.3); color: #f87171; }
        .sdot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .sdot.blink { animation: bl 1.2s infinite; }
        @keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }
        .back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.15);
            border-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
<a href="javascript:history.back()" class="back-btn" title="Go Back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
</a>
<div class="card">
    <span class="robot">&#x1F916;</span>
    <h1>AI Receptionist</h1>
    <p class="sub">Voice-powered appointment booking</p>

    <div class="bars" id="bars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <button id="callBtn">&#x1F4DE;</button>

    <div id="statusPill">
        <div class="sdot" id="sdot"></div>
        <span id="stxt">Click to connect</span>
    </div>
</div>

<script>
// --- Worklet inline code ---
const WORKLET = `
class MicProc extends AudioWorkletProcessor {
    constructor() {
        super();
        this.buffer = new Int16Array(4800);
        this.head = 0;
    }
    process(inputs) {
        const ch = inputs[0] && inputs[0][0];
        if (!ch) return true;
        const ratio = sampleRate / 24000;
        const outLen = Math.floor(ch.length / ratio);
        
        for (let i = 0; i < outLen; i++) {
            let val = ch[Math.floor(i * ratio)];
            this.buffer[this.head++] = Math.max(-1, Math.min(1, val)) * 32767;
            
            if (this.head >= 2400) { // Send 100ms chunks (2400 samples @ 24kHz)
                const chunk = new Int16Array(this.buffer.subarray(0, 2400));
                this.port.postMessage(chunk.buffer, [chunk.buffer]);
                this.head = 0;
            }
        }
        return true;
    }
}
registerProcessor('mic-proc', MicProc);
`;

// --- State ---
let pc, dc, stream, live = false;

// --- DOM ---
const btn    = document.getElementById('callBtn');
const pill   = document.getElementById('statusPill');
const stxt   = document.getElementById('stxt');
const sdot   = document.getElementById('sdot');
const bars   = document.getElementById('bars');

function log(msg) {
    console.log(`[AI-REC] ${msg}`);
}

function status(msg, type) {
    stxt.textContent = msg;
    pill.className = type === 'ok' ? 'ok' : type === 'err' ? 'err' : '';
    pill.id = 'statusPill';
    sdot.className = type === 'ok' ? 'sdot blink' : 'sdot';
}

// --- Button ---
btn.onclick = () => { live ? hangup() : connect(); };

async function connect() {
    log('Starting direct WebRTC connection...');
    status('Requesting microphone...', '');
    btn.textContent = '...';

    try {
        // 1. Get Ephemeral Token from our Django Backend
        log('Fetching session token from backend...');
        const tokenResponse = await fetch('/api/realtime-session/', { 
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' }
        });
        const sessionData = await tokenResponse.json();
        
        if (sessionData.error) throw new Error(sessionData.error);
        const EPHEMERAL_KEY = sessionData.client_secret.value;
        const AVAILABLE_SERVICES = sessionData.available_services || []; // ✅ New dynamic list
        log(`Session token received. Found ${AVAILABLE_SERVICES.length} services.`);

        // 2. Setup RTCPeerConnection
        pc = new RTCPeerConnection();
        log('RTCPeerConnection initialized');

        // 3. Setup Audio Playback
        const audioEl = document.createElement("audio");
        audioEl.autoplay = true;
        audioEl.muted = false;
        audioEl.style.display = 'none';
        document.body.appendChild(audioEl); // ✅ Must be in DOM for audio to play
        pc.ontrack = e => {
            log('Audio track received from OpenAI');
            audioEl.srcObject = e.streams[0];
            bars.classList.add('live');
            // Unlock autoplay (triggered by user gesture already)
            audioEl.play().catch(err => log('Audio play error: ' + err));
        };

        // 4. Setup Microphone Input
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        pc.addTrack(stream.getTracks()[0]);
        log('Microphone track added');

        // 5. Setup Data Channel for Events
        dc = pc.createDataChannel("oai-events");
        
        dc.onopen = () => {
            log('Data Channel OPEN');
            live = true;
            status('Connected - speak now!', 'ok');
            btn.textContent = String.fromCodePoint(0x1F4F5); // end call icon
            btn.classList.add('on');
            
            // Send initial session update with tools
            sendSessionUpdate(AVAILABLE_SERVICES); // ✅ Pass services here
        };

        dc.onmessage = (e) => {
            const response = JSON.parse(e.data);
            handleOpenAIEvent(response);
        };

        // 6. SDP Handshake (SDP Offer)
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        log('Sending SDP offer to OpenAI...');
        const baseUrl = "https://api.openai.com/v1/realtime";
        const model = "gpt-4o-realtime-preview-2024-12-17";
        
        const sdpResponse = await fetch(`${baseUrl}?model=${model}`, {
            method: "POST",
            body: offer.sdp,
            headers: {
                "Authorization": `Bearer ${EPHEMERAL_KEY}`,
                "Content-Type": "application/sdp",
            },
        });

        if (!sdpResponse.ok) {
            const errBody = await sdpResponse.text();
            throw new Error(`OpenAI SDP Error: ${sdpResponse.status} - ${errBody}`);
        }

        const answer = { type: "answer", sdp: await sdpResponse.text() };
        await pc.setRemoteDescription(answer);
        log('SDP Handshake complete. Connection established.');

    } catch (err) {
        log('CRITICAL ERROR: ' + err.message);
        console.error(err);
        status('Connection failed', 'err');
        hangup();
    }
}

function sendSessionUpdate(servicesList = []) {
    const urlParams = new URLSearchParams(window.location.search);
    const bizName = urlParams.get('biz') || "our business";
    const serviceName = urlParams.get('service') || "";

    let contextInstruction = `You are a professional, warm and friendly AI Receptionist for **${bizName}**. `;
    if (serviceName) {
        contextInstruction += `The user has already expressed interest in the **${serviceName}** service. Start the conversation by acknowledging this. `;
    }
    
    // Format service list for prompt
    const servicesStr = servicesList.length > 0 
        ? servicesList.join(', ') 
        : "No services currently available";

    const baseInstructions = `Your job is to help customers book appointments for services. 
    IMPORTANT: The only services you can book are: ${servicesStr}. 
    - If a customer asks for a service NOT in this list, politely explain that it is not available and offer the services from the list above.
    - Do NOT suggest 'Teeth Cleaning' or 'Gym' unless they are in the list provided.
    - To book an appointment: 
        1. Always call 'check_availability' first.
        2. If available, collect Name and Phone, then call 'create_booking'.
    Today's date is April 19, 2026. You are multilingual (English/Bengali).`;

    const SYSTEM_MESSAGE = contextInstruction + baseInstructions;

    const sessionUpdate = {
        type: "session.update",
        session: {
            instructions: SYSTEM_MESSAGE,
            input_audio_transcription: { model: "whisper-1" },
            tools: [
                {
                    type: "function",
                    name: "check_availability",
                    description: "Check if a time slot is available for a service before booking.",
                    parameters: {
                        type: "object",
                        properties: {
                            service: { type: "string", description: "Name of the service" },
                            time: { type: "string", description: "Requested time in ISO format (e.g. 2026-04-15T10:00:00Z)" }
                        },
                        required: ["service", "time"]
                    }
                },
                {
                    type: "function",
                    name: "create_booking",
                    description: "Create a confirmed booking after availability is confirmed.",
                    parameters: {
                        type: "object",
                        properties: {
                            name: { type: "string", description: "Customer full name" },
                            phone: { type: "string", description: "Customer phone number" },
                            service: { type: "string", description: "Service name" },
                            time: { type: "string", description: "ISO format appointment time" },
                            notes: { type: "string", description: "Any additional notes" }
                        },
                        required: ["name", "phone", "service", "time"]
                    }
                }
            ],
            tool_choice: "auto"
        }
    };
    log('Sending session update with tools & instructions...');
    dc.send(JSON.stringify(sessionUpdate));

    // Optional initial greeting
    const greet = {
        type: "conversation.item.create",
        item: {
            type: "message",
            role: "user",
            content: [{ type: "input_text", text: "Hello! Please greet me." }]
        }
    };
    dc.send(JSON.stringify(greet));
    dc.send(JSON.stringify({ type: "response.create" }));
}

async function handleOpenAIEvent(event) {
    if (event.type === 'input_audio_buffer.speech_started') {
        log('AI detected speech...');
    } else if (event.type === 'response.done') {
        const output = event.response.output || [];
        for (const item of output) {
            if (item.type === 'function_call') {
                await handleToolCall(item);
            }
        }
    } else if (event.type === 'error') {
        log('OpenAI Error: ' + JSON.stringify(event.error));
    }
}

async function handleToolCall(toolCall) {
    const { name, arguments: argsJson, call_id } = toolCall;
    const args = JSON.parse(argsJson);
    log(`Tool Call: ${name} | Args: ${argsJson}`);

    let endpoint = '';
    if (name === 'check_availability') endpoint = '/api/check-availability/';
    else if (name === 'create_booking') endpoint = '/api/create-booking/';
    else return;

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: argsJson
        });
        const result = await response.json();
        log(`Tool Result: ${JSON.stringify(result)}`);

        // Send result back to OpenAI
        const toolResponse = {
            type: "conversation.item.create",
            item: {
                type: "function_call_output",
                call_id: call_id,
                output: JSON.stringify(result)
            }
        };
        dc.send(JSON.stringify(toolResponse));
        dc.send(JSON.stringify({ type: "response.create" }));

    } catch (err) {
        log('Tool execution error: ' + err.message);
    }
}

function hangup() {
    if (pc) { pc.close(); pc = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    live = false;
    btn.textContent = String.fromCodePoint(0x1F4DE);
    btn.classList.remove('on');
    bars.classList.remove('live');
    status('Call ended', '');
    log('Session ended.');
}
</script>
</body>
</html>
